server:
  port: ${PORT:8080}
  tomcat:
    # Permite payloads de até 10MB — necessário para imagens em base64 (2MB img → ~2.7MB base64)
    max-http-form-post-size: 10MB
    max-swallow-size: 10MB

spring:
  application:
    name: brilha-mais-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

jwt:
  # Tempo de expiração do Token (15 minutos para alta segurança)
  expiration: 900000
  # Tempo de expiração do Refresh Token (7 dias)
  refresh-expiration: 604800000
  # Chave secreta HMAC para assinatura (injeta a partir do environment)
  secret: ${JWT_SECRET}

# Rate Limiting via Bucket4j Configurations will be handled via code for /api/v1/auth/**
