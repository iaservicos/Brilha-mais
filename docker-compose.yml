version: '3.8'

services:
  # --- SERVIÇO DO BACKEND (SPRING BOOT) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brilhamais_backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
      - SPRING_FLYWAY_SCHEMAS=public
      - SPRING_JPA_PROPERTIES_HIBERNATE_DEFAULT_SCHEMA=public
    networks:
      - brilhamais_network

  # --- SERVIÇO DE INGESTÃO (PYTHON FASTAPI) ---
  python_ingestion:
    build:
      context: ./scripts/scripts_python
      dockerfile: Dockerfile.ingest
    container_name: brilhamais_ingestion
    restart: always
    ports:
      - "8001:8001"
    env_file:
      - .env
    networks:
      - brilhamais_network

  # --- SERVIÇO DO FRONTEND (REACT WEB VITE PWA) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    container_name: brilhamais_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - brilhamais_network

networks:
  brilhamais_network:
    driver: bridge
